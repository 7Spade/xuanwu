name: Repomix Auto Update

on:
  push:
    branches: [ main ]  # 當代碼推送到 main 分支時觸發
  workflow_dispatch:     # 支援手動觸發

jobs:
  repomix-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # 必須開啟寫入權限才能將檔案 Push 回去

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 取得完整歷史紀錄，對部分 git 排除邏輯有幫助

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Repomix
        # 直接執行 npx repomix，它會自動抓取目錄下的 repomix.config.ts 並執行
        run: npx repomix

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update repomix context for AI [skip ci]"
          file_pattern: 'repomix-output.md'