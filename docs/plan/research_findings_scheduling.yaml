plan_id: scheduling-research
objective: "Research scheduling features: Assign Member, Required Skills, ScheduleItem type flow, and reusable search/filter components"
focus_area: scheduling
created_at: "2025-01-01"
created_by: gem-researcher
status: completed

tldr: |
  - ScheduleItem type (src/shared/types/schedule.types.ts) has requiredSkills?: SkillRequirement[] and assigneeIds: string[]
  - Assign Member feature lives in schedule.account-view.tsx (calendar tab dropdown) and org-schedule-governance.tsx (HR tab with skill-aware grouped Select)
  - Required Skills in ProposalDialog (proposal-dialog.tsx) are labeled "Optional" with Select+quantity picker; no required/optional toggle exists
  - OrgScheduleGovernance groups member dropdown into "全部符合" / "部分符合" / "其他成員" using OrgEligibleMemberView projection
  - Reusable search primitives: Command (cmdk) in shadcn-ui/command.tsx and GlobalSearch in workspace.slice; no generic combobox/searchable-select component exists

research_metadata:
  methodology: "Hybrid retrieval: glob for file discovery, grep for pattern matching, view for detailed file examination"
  tools_used:
    - glob
    - grep
    - view
  scope: "Full scheduling vertical slice, shared types, projection bus, shadcn-ui primitives"
  confidence: high
  coverage: 95

