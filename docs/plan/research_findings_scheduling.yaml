patterns_found:
  - category: architecture
    pattern: "Vertical slice architecture per feature"
    description: "Each feature is organized as a slice with _actions.ts, _aggregate.ts, _queries.ts, _hooks/, _components/, _projectors/, index.ts"
    examples:
      - file: scheduling.slice
        location: "src/features/scheduling.slice/"
        snippet: "_actions.ts, _aggregate.ts, _queries.ts, _hooks/, _components/, _projectors/, index.ts"
    prevalence: common

  - category: architecture
    pattern: "Member assignment has TWO distinct UIs with different capabilities"
    description: |
      1. Calendar tab (schedule.account-view.tsx:64-92): DropdownMenuCheckboxItem — flat list, no search, no skill matching
      2. HR tab (org-schedule-governance.tsx:106-318): Select dropdown — grouped by skill match (full/partial/none), no search
      Neither has search functionality for members.
    examples:
      - file: schedule.account-view.tsx
        location: "schedule.account-view.tsx:64-92"
        snippet: |
          <DropdownMenuCheckboxItem
            key={member.id}
            checked={item.assigneeIds.includes(member.id)}
            onCheckedChange={() => {
              if (item.assigneeIds.includes(member.id)) {
                unassignMember(item, member.id);
              } else {
                assignMember(item, member.id);
              }
            }}
          >
            {member.name}
          </DropdownMenuCheckboxItem>
      - file: org-schedule-governance.tsx
        location: "org-schedule-governance.tsx:221-283"
        snippet: |
          <Select value={selectedMemberId} onValueChange={setSelectedMemberId}>
            <SelectContent>
              {/* Groups: fullMatch → partialMatch → noMatch */}
              <SelectGroup>
                <SelectLabel>✓ 全部符合技能（{fullMatch.length}）</SelectLabel>
                {fullMatch.map((m) => <SelectItem key={m.id} value={m.id}>{m.name}</SelectItem>)}
              </SelectGroup>
              ...
            </SelectContent>
          </Select>
    prevalence: common

  - category: architecture
    pattern: "requiredSkills labeled as 'Optional' — no required vs optional distinction"
    description: |
      ProposalDialog labels the skills section as "Required Skills (Optional)" at line 208.
      All skills added have minimumTier hardcoded to 'apprentice' (line 119).
      No UI for changing the tier level or marking skills as truly required.
    examples:
