      location: "src/features/scheduling.slice/_components/schedule.account-view.tsx"
      relationship_to_domain: "Primary consumer of schedule data at org level"
    - component: OrgScheduleGovernance
      responsibility: "HR governance panel with skill-aware member assignment"
      location: "src/features/scheduling.slice/_components/org-schedule-governance.tsx"
      relationship_to_domain: "Most advanced member assignment UI with skill matching"
    - component: ProposalDialog
      responsibility: "Schedule proposal creation form with skill requirements"
      location: "src/features/scheduling.slice/_components/proposal-dialog.tsx"
      relationship_to_domain: "Entry point for requiredSkills data"
    - component: WorkspaceSchedule
      responsibility: "Workspace-level schedule view"
      location: "src/features/scheduling.slice/_components/schedule.workspace-view.tsx"
      relationship_to_domain: "Workspace-scoped calendar with proposal creation"
    - component: OrgEligibleMemberView projection
      responsibility: "Computed skill tier view for member eligibility"
      location: "src/features/projection.bus/org-eligible-member-view/"
      relationship_to_domain: "Schedule reads this projection for skill matching (Invariant #14)"

  data_flow_involving_domain: |
    1. Workspace creates proposal: ProposalDialog → createScheduleItem() → Firestore accounts/{orgId}/schedule_items
    2. requiredSkills flows: ProposalDialog form → ScheduleProposalContent.handleSubmit → createScheduleItem action → schedule.repository
    3. Org reviews: OrgScheduleGovernance reads schedule_items + getOrgEligibleMembersWithTier() for skill matching
    4. Assignment: Select member → approveScheduleItemWithMember() → assignMemberAndApprove (Firestore arrayUnion + status='OFFICIAL')
    5. Calendar assign: renderItemActions dropdown → assignMember() → use-schedule-commands → assignMemberAction → schedule.repository

  key_relationships_to_domain:
    - from: ProposalDialog
      to: ScheduleItem
      relationship: "creates (with requiredSkills)"
    - from: OrgScheduleGovernance
      to: OrgEligibleMemberView
      relationship: "reads for skill matching"
    - from: useScheduleActions
      to: _actions (server)
      relationship: "calls assignMember/unassignMember/approveItem/rejectItem"
    - from: schedule.account-view
      to: useGlobalSchedule
      relationship: "reads organizationMembers, allItems"
    - from: schedule.account-view
      to: useScheduleActions
      relationship: "uses assignMember, unassignMember"

# =================================================================
# RELATED TECHNOLOGY STACK
# =================================================================
related_technology_stack:
  languages_used_in_domain:
    - TypeScript
    - TSX (React)
  frameworks_used_in_domain:
    - name: Next.js (App Router)
      usage_in_domain: "Route pages under app/(shell)/..., server actions in _actions.ts"
    - name: React
      usage_in_domain: "Client components with hooks pattern"
  libraries_used_in_domain:
    - name: shadcn-ui
      purpose_in_domain: "UI primitives: Button, Select, Badge, Card, Dialog, DropdownMenu, Command, Sheet, ScrollArea"
    - name: cmdk
      purpose_in_domain: "Command palette / searchable list (via shadcn Command wrapper)"
    - name: "@tanstack/react-table"
      purpose_in_domain: "Data table for upcoming events and decision history"
    - name: date-fns
      purpose_in_domain: "Date formatting and manipulation"
    - name: lucide-react
      purpose_in_domain: "Icons (UserPlus, Calendar, Users, etc.)"
    - name: zod
      purpose_in_domain: "Schema validation in _aggregate.ts"
    - name: firebase/firestore
      purpose_in_domain: "Data persistence layer"

# =================================================================
# RELATED CONVENTIONS
# =================================================================
related_conventions:
  naming_patterns_in_domain: |
    - Files: kebab-case (schedule.account-view.tsx, org-schedule-governance.tsx)
    - Components: PascalCase (AccountScheduleSection, OrgScheduleGovernance)
    - Hooks: camelCase prefixed with 'use' (useGlobalSchedule, useScheduleActions)
    - Server actions: camelCase (assignMember, createScheduleItem)
    - Types: PascalCase (ScheduleItem, SkillRequirement)
  structure_of_domain: |
    Vertical slice pattern: _actions.ts (server), _aggregate.ts (domain), _queries.ts (reads),
    _hooks/ (React), _components/ (UI), _projectors/ (event handlers), index.ts (barrel)
  error_handling_in_domain: |
    Server actions return CommandResult { success, error }. Client hooks show toast on error.
    Skill validation failures produce compensating events (ScheduleAssignRejected).
  testing_in_domain: "No test files found in scheduling.slice"
  documentation_in_domain: |
    Heavy JSDoc with @fileoverview, @description, @responsibility.
    Invariant references (#1, #2, #12, #14, etc.) cross-reference architecture docs.
    Chinese+English bilingual inline comments.

# =================================================================
# RELATED DEPENDENCIES
# =================================================================
related_dependencies:
  internal:
    - component: "workspace.slice (useAccount, useWorkspace)"
      relationship_to_domain: "Provides workspace context and account state with schedule_items"
      direction: inbound
    - component: "projection.bus (getOrgEligibleMembersWithTier)"
      relationship_to_domain: "Schedule reads eligible member projections for skill matching"
      direction: outbound
    - component: "shared-kernel (SkillRequirement, tierSatisfies, resolveSkillTier, CommandResult)"
      relationship_to_domain: "Shared types and utility functions"
      direction: outbound
    - component: "organization.slice (publishOrgEvent)"
      relationship_to_domain: "Aggregate publishes domain events"
      direction: outbound
    - component: "skill-xp.slice (getOrgSkillTags)"
      relationship_to_domain: "ProposalDialog loads org skill pool"
      direction: outbound
    - component: "shared/constants/skills (SKILLS, findSkill)"
      relationship_to_domain: "Global skill dictionary for name resolution"
      direction: outbound

# =================================================================
# OPEN QUESTIONS
# =================================================================
open_questions:
  - question: "Why does ProposalDialog hardcode minimumTier to 'apprentice' for all skill requirements?"
    context: "Line 119 of proposal-dialog.tsx sets minimumTier: 'apprentice' — there's no UI to set tier level. This may be intentional (workspace proposes needs, org decides tier) or a missing feature."

  - question: "Why does the Calendar tab's Assign Member dropdown (schedule.account-view.tsx) not have skill matching while the HR tab does?"
    context: "The Calendar tab uses a simple DropdownMenuCheckboxItem list while the HR tab uses grouped Select with full/partial/no skill match. This could be by design (Calendar is quick-assign, HR is formal) or an inconsistency."

  - question: "Is the DemandBoard component (demand-board.tsx) still actively used or superseded by OrgScheduleGovernance?"
    context: "The account-view file comment says 'DemandBoard (old Tab 2) removed' but the component is still exported from index.ts and the file exists."

# =================================================================
# GAPS
# =================================================================
gaps:
  - area: "No search/filter in member assignment dropdowns"
    description: "Neither the Calendar tab dropdown nor the HR governance Select has text search filtering. For organizations with many members, this could be a usability issue."
    impact: "Users must scroll through entire member list to find the right person."

  - area: "No reusable searchable-select / combobox component"
    description: "The codebase has the Command (cmdk) primitive in shadcn-ui but no generic searchable-select wrapper component. GlobalSearch exists but is a full-dialog implementation, not a dropdown-style combobox."
    impact: "Building searchable member assignment requires either creating a new combobox component or adapting the Command primitive."

  - area: "No test files in scheduling.slice"
    description: "The scheduling vertical slice has no unit or integration tests."
    impact: "Changes to scheduling logic cannot be automatically verified."
